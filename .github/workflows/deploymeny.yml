name: Auto Deploy MERN App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.EC2_PORT }} ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Full Server Setup + MongoDB Config
        run: |
          ssh -p ${{ secrets.EC2_PORT }} ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          echo "===== UPDATE SERVER ====="
          sudo apt update -y

          echo "===== INSTALL NGINX ====="
          if ! command -v nginx >/dev/null 2>&1; then
            sudo apt install -y nginx
            sudo systemctl enable nginx
          fi

          echo "===== INSTALL NODEJS ====="
          if ! command -v node >/dev/null 2>&1; then
            curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
            sudo apt install -y nodejs
          fi

          echo "===== INSTALL PM2 ====="
          if ! command -v pm2 >/dev/null 2>&1; then
            sudo npm install -g pm2
          fi

          echo "===== INSTALL MONGODB 7.0 ====="
          if ! command -v mongod >/dev/null 2>&1; then
            curl -fsSL https://pgp.mongodb.com/server-7.0.asc | \
            sudo gpg -o /usr/share/keyrings/mongodb-server-7.0.gpg --dearmor

            echo "deb [ arch=amd64 signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | \
            sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list

            sudo apt update -y
            sudo apt install -y mongodb-org
          fi

          echo "===== ENABLE MONGODB ====="
          sudo systemctl enable mongod
          sudo systemctl stop mongod || true

          echo "===== CONFIGURE MONGODB ====="
          sudo bash -c 'cat > /etc/mongod.conf <<CONFIG
          storage:
            dbPath: /var/lib/mongodb

          systemLog:
            destination: file
            logAppend: true
            path: /var/log/mongodb/mongod.log

          net:
            port: 27017
            bindIp: 0.0.0.0

          processManagement:
            timeZoneInfo: /usr/share/zoneinfo

          security:
            authorization: enabled
          CONFIG'

          echo "===== START MONGODB ====="
          sudo systemctl daemon-reload
          sudo systemctl restart mongod
          sleep 10

          echo "===== CHECK STATUS ====="
          sudo systemctl status mongod --no-pager || true

          echo "===== CREATE ADMIN USER ====="
          mongosh admin --eval '
            try {
              db.createUser({
                user: "mscgu",
                pwd: "mscgu2025",
                roles: [{ role: "root", db: "admin" }]
              });
              print("User Created");
            } catch(e) {
              print("User Already Exists");
            }
          ' || true

          echo "===== RESTART AFTER USER ====="
          sudo systemctl restart mongod
          sleep 5

          mkdir -p /home/ubuntu/app
          EOF

      - name: Upload Project Files
        run: |
          scp -P ${{ secrets.EC2_PORT }} -r frontend backend \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/app/

      - name: Run Backend + Frontend
        run: |
          ssh -p ${{ secrets.EC2_PORT }} ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          echo "===== BACKEND ====="
          cd /home/ubuntu/app/backend

          npm install

          echo "PORT=5000" > .env
          echo "MONGO_URI=mongodb://mscgu:mscgu2025@${{ secrets.EC2_HOST }}:27017/mscgu?authSource=admin" >> .env

          pm2 delete backend-app || true
          pm2 start server.js --name backend-app
          pm2 save

          echo "===== FRONTEND ====="
          cd /home/ubuntu/app/frontend
          npm install
          npm run build

          sudo rm -rf /var/www/html/*
          sudo cp -r build/* /var/www/html/

          sudo systemctl restart nginx

          echo "===== DEPLOY SUCCESS ====="
          EOF
